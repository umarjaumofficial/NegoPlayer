name: NegoPlayer - Build and Infinite Gemini Repair

# Author: Muhammad Umar
# Project: NegoPlayer
#
# This workflow attempts to build the Android project.
# If it fails, Gemini CLI repairs the code and retries.
# There is NO cap on repair rounds - it loops until the build is green.

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  JAVA_VERSION: "17"

permissions:
  contents: write
  actions: read

jobs:
  build-and-repair:
    name: Build - Gemini Repairs Until Success
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config --global user.name "NegoPlayer Gemini Bot"
          git config --global user.email "gemini-bot@negoplayer.ci"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      # ----------------------------------------------------------------
      # INFINITE REPAIR LOOP
      #
      # The prompt template lives in .github/gemini-prompt-template.txt
      # so there is NO heredoc inside this YAML block at all.
      #
      # Each iteration:
      #   1. Run ./gradlew assembleDebug
      #   2. If exit 0  -> write REPAIR_ROUNDS env var, break
      #   3. If exit != 0 -> build prompt from template + error log,
      #                      run Gemini CLI, commit changes, retry
      # ----------------------------------------------------------------
      - name: Infinite Repair Loop - Build until success
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ROUND=0

          while true; do
            ROUND=$((ROUND + 1))
            BUILD_LOG="build_round_${ROUND}.txt"

            echo ""
            echo "========================================================"
            echo "  NegoPlayer Build  |  Round ${ROUND}"
            echo "  Author: Muhammad Umar  |  Pakistan"
            echo "========================================================"

            # --- a) Attempt build ---
            ./gradlew assembleDebug --stacktrace 2>&1 | tee "$BUILD_LOG"
            BUILD_EXIT=${PIPESTATUS[0]}

            if [ "$BUILD_EXIT" -eq 0 ]; then
              echo "BUILD SUCCEEDED on round ${ROUND}."
              printf "REPAIR_ROUNDS=%s\n" "$ROUND" >> "$GITHUB_ENV"
              break
            fi

            echo "Build FAILED on round ${ROUND}. Invoking Gemini repair..."

            # --- b) Extract tail of error log (last 400 lines) ---
            ERROR_TAIL=$(tail -400 "$BUILD_LOG")

            # --- c) Build prompt from template ---
            # Read the template, replace the placeholder with real error log.
            # Using Python to do the substitution safely avoids shell escaping issues.
            PROMPT_FILE="/tmp/gemini_prompt_${ROUND}.txt"
            python3 -c "
          import sys

          template_path = '.github/gemini-prompt-template.txt'
          error_log = sys.stdin.read()

          with open(template_path, 'r') as f:
              template = f.read()

          prompt = template.replace('__ERROR_LOG__', error_log)

          with open('$PROMPT_FILE', 'w') as f:
              f.write(prompt)

          print('Prompt written to $PROMPT_FILE')
          " <<< "$ERROR_TAIL"

            # --- d) Run Gemini CLI ---
            gemini \
              --api-key "$GEMINI_API_KEY" \
              --model "gemini-2.5-pro" \
              --sandbox false \
              --yolo \
              < "$PROMPT_FILE" \
              2>&1 | tee "/tmp/gemini_output_${ROUND}.txt" \
              || echo "Gemini CLI returned non-zero - continuing anyway"

            # --- e) Commit whatever Gemini changed ---
            git add -A
            if git diff --cached --quiet; then
              echo "Gemini made no file changes on round ${ROUND}."
            else
              CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
              git commit -m "fix(gemini-round-${ROUND}): auto-repair NegoPlayer - ${CHANGED}"
              git push origin HEAD \
                || { git pull --rebase origin HEAD && git push origin HEAD; }
            fi

            # --- f) Pull any remote changes before next round ---
            git pull --rebase origin HEAD 2>/dev/null || true

            echo "Retrying build - round $((ROUND + 1)) coming up..."
            sleep 5
          done

      - name: Upload build logs from all rounds
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-all-rounds
          path: build_round_*.txt
          retention-days: 14
          if-no-files-found: ignore

      - name: Build Release APK
        run: |
          echo "Debug build succeeded after ${{ env.REPAIR_ROUNDS }} round(s). Building release..."
          ./gradlew assembleRelease --stacktrace

      - name: Sign Release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          BT_VER=$(ls "$ANDROID_SDK_ROOT/build-tools/" | sort -V | tail -1)
          BT="$ANDROID_SDK_ROOT/build-tools/$BT_VER"
          "$BT/apksigner" sign \
            --ks release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          "$BT/zipalign" -v 4 \
            app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/app-release-aligned.apk
          rm -f release.keystore

      - name: Upload NegoPlayer-APK
        uses: actions/upload-artifact@v4
        with:
          name: NegoPlayer-APK
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NegoPlayer v1.0.${{ github.run_number }}
          body: |
            ## NegoPlayer Release

            **Author:** Muhammad Umar Jabbar
            **Built in:** Rawalpindi, Pakistan
            **Gemini repair rounds needed:** ${{ env.REPAIR_ROUNDS }}

            ### Features
            - 4K and HDR playback via Media3 ExoPlayer 1.4
            - HLS, DASH, RTMP, RTSP streaming
            - IPTV with M3U playlist support
            - Local media library with MediaStore scanning
            - Gesture controls for brightness, volume, and seek
            - Subtitle engine supporting SRT, ASS, and VTT
            - Picture-in-Picture mode
            - Material 3 dark theme
            - Clean Architecture with MVVM, Hilt, and Room

            ### Install
            Download app-release-unsigned.apk and install on Android 8.0 or higher.

            Proudly Built in Pakistan
          files: app/build/outputs/apk/release/app-release*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Final build summary
        if: always()
        run: |
          echo "========================================================"
          echo "  NegoPlayer - Final Build Summary"
          echo "  Author  : Muhammad Umar Jabbar"
          echo "  Location: Rawalpindi, Pakistan"
          echo "  Rounds  : ${{ env.REPAIR_ROUNDS }}"
          echo "========================================================"
          for APK in \
            app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/debug/app-debug.apk; do
            if [ -f "$APK" ]; then
              SIZE=$(du -sh "$APK" | cut -f1)
              echo "  OK  $(basename $APK)  $SIZE"
            fi
          done
          echo "========================================================"
